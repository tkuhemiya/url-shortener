<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Shortener</title>
  <link rel="stylesheet" href="/app.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
<div class="container" x-data="urlsPage()" x-init="init()">
  <div class="header">
    <h1>Your URLs</h1>
    <div style="display:flex; gap:8px;">
      <a class="btn secondary" href="/analytics.html">Open Analytics</a>
      <a class="btn secondary" href="/auth.html" x-show="!me.authenticated">Sign in</a>
    </div>
  </div>

  <div class="card" style="margin-bottom: 14px;">
    <h3 class="section-title">Account</h3>
    <div x-show="me.authenticated" class="small">
      Signed in as <strong x-text="me.email"></strong>
      <button class="btn secondary" style="margin-left: 8px;" @click="logout()">Log out</button>
    </div>

    <div x-show="!me.authenticated" class="small">
      Guest users can create up to 5 links. <a href="/auth.html">Create an account</a> to unlock more links and transfer your existing ones.
    </div>
  </div>

  <div class="card">
    <h3 class="section-title">Create short URL</h3>
    <form class="form-row" @submit.prevent="createUrl()">
      <input class="input" type="url" placeholder="https://example.com/some/long/path" x-model="formUrl" required />
      <button class="btn" type="submit" :disabled="loadingCreate" x-text="loadingCreate ? 'Creating...' : 'Create'"></button>
    </form>
    <div class="error" x-text="error" x-show="error"></div>
    <div class="success" x-text="success" x-show="success"></div>
  </div>

  <div class="loading-wrap" x-show="loadingLinks">
    <div class="spinner" aria-label="Loading links"></div>
  </div>

  <div class="empty-state" x-show="!loadingLinks && links.length === 0">
    <div class="card">No links yet. Create your first short URL above.</div>
  </div>

  <div class="grid" x-show="!loadingLinks && links.length > 0">
    <template x-for="link in links" :key="link.id">
      <div class="card link-card" @click="openAnalytics(link)">
        <div class="short-row">
          <div class="short-wrap">
            <div class="short-url" x-text="link.shortUrl"></div>
            <div class="copy-hint" x-show="copiedLinkId === link.id">Copied</div>
          </div>
          <button class="btn secondary" @click.stop="copy(link)">
            <span x-text="copiedLinkId === link.id ? 'Copied' : 'Copy'"></span>
          </button>
        </div>
        <div class="original-url" x-text="link.originalUrl"></div>
        <div class="meta">
          Clicks: <span x-text="link.clickCount"></span>
        </div>
      </div>
    </template>
  </div>
</div>

<script>
  function urlsPage() {
    return {
      links: [],
      formUrl: '',
      loadingCreate: false,
      loadingLinks: true,
      copiedLinkId: null,
      error: '',
      success: '',
      me: { authenticated: false, email: null },

      async init() {
        await this.fetchMe();
        await this.fetchLinks();
      },

      async fetchMe() {
        const res = await fetch('/api/auth/me');
        this.me = await res.json();
      },

      async fetchLinks() {
        try {
          this.loadingLinks = true;
          const res = await fetch('/api/links');
          this.links = await res.json();
        } finally {
          this.loadingLinks = false;
        }
      },

      async logout() {
        await fetch('/api/auth/logout', { method: 'POST' });
        this.me = { authenticated: false, email: null };
        await this.fetchLinks();
      },

      async createUrl() {
        this.error = '';
        this.success = '';
        this.loadingCreate = true;
        try {
          const res = await fetch('/api/links', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: this.formUrl })
          });

          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.message || 'Failed to create short URL');
          }

          const created = await res.json();
          this.links.unshift(created);
          this.success = 'Short URL created.';
          this.formUrl = '';
        } catch (e) {
          this.error = e.message;
        } finally {
          this.loadingCreate = false;
        }
      },

      async copy(link) {
        await navigator.clipboard.writeText(link.shortUrl);
        this.copiedLinkId = link.id;
        setTimeout(() => {
          if (this.copiedLinkId === link.id) this.copiedLinkId = null;
        }, 1200);
      },

      openAnalytics(link) {
        window.location.href = `/analytics.html?linkId=${link.id}`;
      }
    }
  }
</script>
</body>
</html>
