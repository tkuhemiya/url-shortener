services:
  postgres:
    image: postgres:16
    container_name: shortener-postgres
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shortener-redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: shortener-app
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/url_shortener
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SHORT_BASE_URL: http://localhost:8080
    ports:
      - "8080:8080"

volumes:
  postgres_data:
